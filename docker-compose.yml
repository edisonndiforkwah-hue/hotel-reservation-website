services:
  # ---------------------------------------------------------------------------
  # Laravel app (Nginx + PHP-FPM in one container)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hotel-app:latest
    container_name: hotel_app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "80"
    environment:
      APP_NAME: "${APP_NAME:-Hotel}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-https://localhost}"
      APP_LOCALE: "${APP_LOCALE:-en}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-hotel_db}"
      DB_USERNAME: "${DB_USERNAME:-hotel_user}"
      DB_PASSWORD: "${DB_PASSWORD:-hotel_secret}"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
    volumes:
      - hotel_storage:/var/www/html/storage
      - hotel_room_img:/var/www/html/public/room_img
      - hotel_gallery:/var/www/html/public/gallery
      - hotel_blog_img:/var/www/html/public/blog_img
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hotel_net

  # ---------------------------------------------------------------------------
  # Caddy reverse proxy (automatic HTTPS)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: hotel_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      ACME_EMAIL: "${ACME_EMAIL:-admin@example.com}"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - hotel_net

  # ---------------------------------------------------------------------------
  # MySQL database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: hotel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root_secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-hotel_db}"
      MYSQL_USER: "${DB_USERNAME:-hotel_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-hotel_secret}"
    volumes:
      - hotel_mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - hotel_net

volumes:
  hotel_storage:
  hotel_room_img:
  hotel_gallery:
  hotel_blog_img:
  hotel_mysql_data:
  caddy_data:
  caddy_config:

networks:
  hotel_net:
    driver: bridge
